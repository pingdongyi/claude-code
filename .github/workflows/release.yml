name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version (leave empty for auto-detect)'
        required: false
        type: string
      force:
        description: 'Force rebuild even if release exists'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Detect new versions
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "versions=[\"${{ inputs.version }}\"]" >> "$GITHUB_OUTPUT"
            echo "Manual: ${{ inputs.version }}"
          else
            EXISTING=$(gh release list --limit 200 --json tagName \
              --jq '[.[].tagName | ltrimstr("v")]' 2>/dev/null || echo '[]')
            VERSIONS=$(node scripts/check-new-versions.mjs \
              --existing "$EXISTING" --json)
            echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.versions != '[]' && needs.check.outputs.versions != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.check.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Build all platform packages
        run: |
          node scripts/local-extract.mjs \
            --version "${{ matrix.version }}" \
            --output "./artifacts" \
            --all

      - name: Verify linux-x64 package
        run: |
          VERSION="${{ matrix.version }}"
          TARBALL="./artifacts/anthropic-ai-claude-code-${VERSION}-linux-x64.tgz"

          if [ ! -f "$TARBALL" ]; then
            echo "Tarball not found"
            ls -la ./artifacts/
            exit 1
          fi

          # Extract and test
          mkdir -p /tmp/verify
          tar xzf "$TARBALL" -C /tmp/verify
          cd /tmp/verify/package

          npm install --omit=optional --no-audit --no-fund
          node cli.js --version
          node cli.js --help | head -5

          rm -rf /tmp/verify

      - name: List artifacts
        run: |
          ls -lh ./artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.version }}
          path: artifacts/*.tgz

  release:
    needs: [check, build]
    if: needs.check.outputs.versions != '[]' && needs.check.outputs.versions != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.check.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-${{ matrix.version }}
          path: artifacts/

      - name: Sync CHANGELOG
        run: |
          curl -sL "https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md" \
            -o CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || (git commit -m "changelog: sync v${{ matrix.version }}" && git push)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ matrix.version }}"

          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            if [ "${{ inputs.force }}" = "true" ]; then
              gh release delete "v${VERSION}" --repo "$GITHUB_REPOSITORY" --yes
            else
              echo "Release v${VERSION} already exists, skipping"
              exit 0
            fi
          fi

          # Get release notes from official Claude Code
          BODY=$(gh api "repos/anthropics/claude-code/releases/tags/v${VERSION}" --jq '.body' 2>/dev/null || echo "")

          # Write combined release notes to a temp file (avoids shell quoting issues)
          NOTES_FILE=$(mktemp)
          {
            printf '%s\n\n' "$BODY"
            printf '%s\n' "---"
            printf '\n%s\n\n%s\n\n' "## Installation (Node.js restored)" "These packages restore Claude Code for Node.js execution (extracted from official Bun SEA binaries)."
            printf '%s\n\n%s\n\n' "### Quick Install" "Download the tarball for your platform and install locally:"
            printf '    npm install ./anthropic-ai-claude-code-%s-linux-x64.tgz\n\n' "$VERSION"
            printf '%s\n\n' "### Available Platforms"
            printf '%s\n%s\n' "| Platform | Tarball |" "|----------|---------|"
            printf '| macOS ARM64 | anthropic-ai-claude-code-%s-darwin-arm64.tgz |\n' "$VERSION"
            printf '| macOS x64 | anthropic-ai-claude-code-%s-darwin-x64.tgz |\n' "$VERSION"
            printf '| Linux ARM64 | anthropic-ai-claude-code-%s-linux-arm64.tgz |\n' "$VERSION"
            printf '| Linux x64 | anthropic-ai-claude-code-%s-linux-x64.tgz |\n' "$VERSION"
            printf '| Linux ARM64 (musl) | anthropic-ai-claude-code-%s-linux-arm64-musl.tgz |\n' "$VERSION"
            printf '| Linux x64 (musl) | anthropic-ai-claude-code-%s-linux-x64-musl.tgz |\n' "$VERSION"
            printf '| Windows ARM64 | anthropic-ai-claude-code-%s-win32-arm64.tgz |\n' "$VERSION"
            printf '| Windows x64 | anthropic-ai-claude-code-%s-win32-x64.tgz |\n' "$VERSION"
          } > "$NOTES_FILE"

          gh release create "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            artifacts/*.tgz

          rm -f "$NOTES_FILE"